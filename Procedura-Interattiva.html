<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Guida Integrata Integrity DD - Zoom & Ribbon</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background-color: #f4f7f9; color: #333; }
        .header { text-align: center; margin-bottom: 20px; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 1600px; margin: auto; }
        
        .nav { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        button { padding: 10px 18px; cursor: pointer; border: 2px solid #01579b; border-radius: 6px; background: white; color: #01579b; font-weight: bold; transition: all 0.2s; }
        button:hover { background: #e1f5fe; }
        button.active { background: #01579b; color: white; }

        .controls { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 15px; background: #eee; padding: 10px; border-radius: 8px; position: sticky; top: 0; z-index: 10; }
        .zoom-btn { padding: 5px 15px; background: #555; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .zoom-btn:hover { background: #333; }

        #diagram-viewport {
            width: 100%;
            height: 70vh;
            border: 1px solid #ccc;
            border-radius: 8px;
            overflow: auto;
            background: #fafafa;
            position: relative;
        }

        #diagram-viewport::-webkit-scrollbar { width: 14px; height: 14px; }
        #diagram-viewport::-webkit-scrollbar-track { background: #f0f0f0; }
        #diagram-viewport::-webkit-scrollbar-thumb { background: #01579b; border-radius: 7px; border: 3px solid #f0f0f0; }
        #diagram-viewport::-webkit-scrollbar-thumb:hover { background: #003f75; }

        #mermaid-wrapper {
            transform-origin: 0 0;
            padding: 40px;
            display: inline-block;
            min-width: 100%;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Workflow Interattivo Integrity DD</h1>
    <p>Seleziona una fase e usa lo zoom per navigare nei dettagli</p>
</div>

<div class="container">
    <div class="nav">
        <button id="btn-master" onclick="loadDiagram('master')">Workflow Master</button>
        <button id="btn-fase1" onclick="loadDiagram('fase1')">Fase 1: Documentale</button>
        <button id="btn-fase2" onclick="loadDiagram('fase2')">Fase 2: Proprietà</button>
        <button id="btn-fase3" onclick="loadDiagram('fase3')">Fase 3: Organizzazione</button>
        <button id="btn-fase4" onclick="loadDiagram('fase4')">Fase 4: Screening</button>
    </div>

    <div class="controls">
        <span>Zoom: <strong id="zoom-val">100%</strong></span>
        <button class="zoom-btn" onclick="changeZoom(0.1)">+</button>
        <button class="zoom-btn" onclick="changeZoom(-0.1)">-</button>
        <button class="zoom-btn" onclick="resetZoom()">Reset</button>
    </div>

    <div id="diagram-viewport">
        <div id="mermaid-wrapper"></div>
    </div>
</div>

<script>
    mermaid.initialize({ 
        startOnLoad: false, 
        securityLevel: 'loose',
        theme: 'default',
        flowchart: { useMaxWidth: false, htmlLabels: true }
    });

    const diagrams = {
        master: `---
config:
  layout: elk
---
flowchart TB
  Start(["RICEZIONE PRATICA da FR"]) --> SatA[["FASE 1: VERIFICA DOCUMENTALE"]]
  SatA --> SatB[["FASE 2: <br> RICOSTRUZIONE ASSETTO PROPRIETARIO"]]
  SatB --> SatC[["FASE 3: <br> RICOSTRUZIONE ASSETTO ORGANIZZATIVO"]]
  SatC --> SatD[["FASE 4: <br> SCREENING E FONTI APERTE"]]
  SatD --> Finish(["Completamento e chiusura DD "]) --> SatE[["FASE 5: <br> Monitoraggio CTP"]]

    style SatA fill:#e1f5fe,stroke:#01579b,stroke-width:2px
    style SatB fill:#e1f5fe,stroke:#01579b,stroke-width:2px
    style SatC fill:#e1f5fe,stroke:#01579b,stroke-width:2px
    style SatD fill:#e1f5fe,stroke:#01579b,stroke-width:2px
    style SatE fill:#e1f5fe,stroke:#01579b,stroke-width:2px`,

        fase1: `---
config:
  layout: elk
---
flowchart TB
    Start(("INIZIO FASE 1:<br> VERIFICA DOCUMENTALE")) --> DDCROSS["CK Vista trasversale: <br>- query e-PAGE per ck DD SECUR<br> -mail APR in caso di DD in Liste Interne Eni &gt; Procurement <br> -mail KYC &gt; ETB e EGEM, in caso di CTP trading/shipping/broker"]
    DDCROSS --> CKDD@{shape: diamond, label: "VISTA TRASVERSALE: <br> DD svolte di recente?"}
    CKDD -- Sì --> ASKUR("Ck con Resp. II liv per proposta a UR di richiesta Riduzione/Esenzione a P.S. ACC")
    CKDD -- No --> BASE["Check docs standard:<br>- UR &gt; Modulo Informazioni Preliminari - MIP<br>- UR &gt; Tool Valutazione Rischio<br>- DD4Eni Company Card / Cribis / D&B / Orbis <br> - UR &gt; Form Rapporto Integrity DD - Sez. UR"]
    ASKUR -- "Proposta in <br>valutazione al P.S." --> CKANSW{"Esenzione O Riduzione?"}
    CKANSW -- Riduzione --> Start
    CKANSW -- Esenzione --> CLOSE(("VAI A WF Master &gt; <br> Completamento e chiusura DD"))
    ASKUR -- Proposta respinta --> BASE
    BASE --> FATTISPECIE{"<b> Fattispecie Ctr </b>"}
    FATTISPECIE --> PFIN{"Progetti Finanziati, Organizzazioni No Profit"}
    PFIN -- "-Adesione a Prog. finanziati <br> -Costituzione di No Profit <br> -Adesione a No Profit già costituite" --> RISK
    FATTISPECIE -- Sponsorship --> SPONS["Nota di Avvio DD &gt; <br> Descr. sponsorizzazione & beneficiario"]
    FATTISPECIE --> BA{"Business Agreement"} & BA1{"Business Associate"}
    BA -- Investimenti &gt; M&A --> MA1["Questionario sul Target"]
    BA -- Investimenti &gt; JV <br> Investimenti &gt; CVC --> RISK{"CK Liv. Rischio <br> altri CTR"}
    BA1 -- Canali di vendita (distribuzione/rivendita di prodotti/servizi) &gt; Contratti di agenzia --> AGENT["Dichiarazione Compliance Sub-agenti (SE PREVISTI)"]
    BA1 -- "Intermediari - P.G,<br> Consulenti P.G. <br> Agenti <br> Broker" --> RISK
    BA1 --> CONSLIST{"CONSULENTI <br> gestiti con ELENCHI"}
    CONSLIST -- "Consulenti P.G. <br> Studi professionali" --> CONSPG["Visura Camerale o documento equivalente (non più vecchia di 6 mesi)"]
    CONSPG --> CONSLETT["Lettera Anti-Corruzione <br>e Anti-Riciclaggio <br> per Consulenti <br>& Doc. Identità"]
    CONSLIST -- "Consulenti P.F." --> CONSLETT
    CONSLETT --> FINE["Avvio ANALISI <br> previste per tipo DD"] & FINE
    BA1 -- "Consulenti P.F." --> CONSLETT
    BA1 -- "Collaboration Agreement: <br> -Collaborazioni commerciale / forestry / università / agrefeedstock <br> -Consulenti P.G. |" --> RISK
    SPONS --> RISK1{"CK Liv. Rischio <br>SPONS"}
    MA1 --> RISK
    AGENT --> RISK
    RISK -- Livello 1 / 2 --> FINE
    RISK -- Livello 3 / 4 --> CheckPA{"CTP P.A. <br> CTP sottoposta a controllo pubblico <br> International Company <br> Società controllate al 100%"}
    RISK1 -- Livello 2 / 3 / 4 --> CheckPA
    RISK1 -- Livello 1 --> FINE
    CheckPA -- Sì --> FINE
    CheckPA -- No --> CKTRUST{"CTP soggetta a TRUST / Società FIDUCIARIA?"}
    CKTRUST -- No ---> HIGH("Ck Modulistica (Questionario DD risk based):<br>(i) sottoscritta da Legale Rappresentante / soggetto con adeguati poteri di rappresentanza;<br>(ii) completa di documentazione richiesta (visura su titolari e RL/PRES/AD)")
    CKTRUST -- Si --> DISCLOSURE("Richiesta a CTP/Fiduciaria/Trust disclosure P.F. che hanno partecipazioni in CTP")
    DISCLOSURE --> HIGH
    HIGH --> CKMOD{"Modulistica ricevuta?"}
    CKMOD -- Si --> FINE
    CKMOD -- No ---> STOP["SOSPENSIONE DD fino a ricezione Modulistica"]
    STOP --> HIGH
    FINE --> END(("FINE FASE 1:<br> VERIFICA DOCUMENTALE"))

    style Start fill:#FFE0B2
    style DDCROSS fill:#e1f5fe,stroke:#01579b,text-align:left
    style CKDD fill:#FFF9C4
    style BASE fill:#e1f5fe,stroke:#01579b,text-align:left
    style CKANSW fill:#BBDEFB

    style RISK fill:#fff9c4,stroke:#fbc02d

    style DISCLOSURE text-align:left
    style CKMOD fill:#fff9c4,stroke:#fbc02d
    style STOP fill:#FF6D00
    style END fill:#FFE0B2`,

        fase2: `---
config:
  layout: elk
---
flowchart TB
    Start(("INIZIO FASE 2:<br> RICOSTRUZIONE <br> ASSETTO PROPRIETARIO")) -- "NATURA GIURIDICA CTP" --> 
    TriagePG-PF{"CTP P.F. o P.G.?"} -- P.F. --> DismissPF("Identificazione dei titolari")-->Consolidation
    TriagePG-PF -- P.G. --> CkOwn["Focus su assetto proprietario <br> e controllo"]
    CkOwn --> Triage1{"CTP Ente pubblico o controllata al 100% da Ente pubblico?"}
    Triage1 -- SI --> Dismiss["Ricostruzione assetto proprietario non richiesto"]
    Dismiss --> End(("FINE FASE 2:<br> RICOSTRUZIONE <br> ASSETTO PROPRIETARIO"))
    Triage1--NO--> Triage1_1{"CTP controllata, direttamente o indirettamente, non al 100% dallo Stato o altro Ente pubblico?"}
    Triage1_1--SI-->Partial["Ricostruzione assetto proprietario <br>sui soli soci di natura privata"] 
    Triage1_1 -- NO --> Triage3{"CTP appartenente a Network Internazionale?"}
    Triage3 -- SI --> Dismiss
    Triage3 -- NO --> Triage2{"CTP International Company o controllata al 100% da I.C.?"}
    Triage2 -- SI --> Dismiss
    Partial --> CkCTP["Focus su natura societaria della P.G"]
    Triage2 -- NO --> Dismiss2["Ricostruzione assetto proprietario solo su soli soci DIVERSI dalla I.C."]
    Dismiss2 --> CkCTP
    
    CkCTP --> TriageMKT{"Società quotata su mercato regolamentato?"} --SI--> 
    MKT1("Individuazione azionisti pubblici con partecipazioni dirette / indirette &gt;=5% <br> Ck siti autorità mercati / documentazione INDIPENDENTE (se info incomplete/ non disponibili)")
    --> Consolidation
    TriageMKT -- NO --> TriageNoP{"Cooperativa/ Associazione/ Fondazione/ Ente non profit?"} -- SI --> TriageNoP1{"Soci tesserati e/o che non detengono quote"?} 
    TriageNoP1 -- NO --> Nop1("Individuazione soci / associati /fondatori <br> e componenti organi di gestione/ indirizzo / direzione") --> Consolidation
    TriageNoP1 -- SI --> Dismiss
    TriageNoP -- NO --> TriageTRUST{"società fiduciaria / Trust?"} -- SI --> TRUST1("Disclosure da CTP su P.F. con partecipazioni dirette / indirette <br> nella CTP tramite fiduciaria/trust") --> Consolidation
    TriageTRUST -- NO --> TriageFI{"Fondo di Investimento?"} -- SI --> FI1("Info su: numero / tipologia investitori/ titolari; <br> organi indirizzo; <br> società di gestione") --> Consolidation
    TriageFI -- NO --> TriageR4Raff{"CTP proposta da soggetto pubblico/P.Uff. <br> e con natura di società privata locale <br> residente/operante in Paesi ad alto rischio corruzione e/o riciclaggio"}
    TriageR4Raff -- SI --> Threshold_All("Tutte le P.F. e P.G. con ogni singola partecipazione") --> Consolidation
    TriageR4Raff --NO --> TriageCTR{"CK Fattispecie <br> Contratto"}

    TriageCTR ---> BAg["Business Agreement"] -- "Investimenti &gt; M&A <br> Investimenti &gt; JV <br>Investimenti &gt; CVC" --> TriageR1{"Livello di rischio <br> DD da 2 a 4"}
    Threshold_All --> Consolidation["CONSOLIDAMENTO LISTA NOMINATIVI <br>(Persone Fisiche e Giuridiche)"]
    TriageR1 -- L2 --> Threshold_20("P.F. e P.G. con soglia partecipazioni &gt;= 20%") --> Consolidation
    TriageR1 -- L3 --> Threshold_10("P.F. e P.G. con soglia partecipazioni &gt;= 10%") --> Consolidation
    TriageR1 -- L4 --> Threshold_5("P.F. e P.G. con soglia partecipazioni &gt;= 5%") --> Consolidation

    TriageCTR --> BA["Business associate"]-- "Canali di vendita &gt; Contratti di agenzia" --> TriageR2{"Livello di rischio <br> DD da 3 a 4"}
    BA -- "Intermediari - caso P.G.: agevolano stipula ctr con soggetti terzi" --> TriageR2
    BA -- "Consulenti. Agenti e Broker - caso P.G.: commercializzano prodotti/servizi Eni" --> TriageR2
    BA--"Consulenti gestiti tramite ELENCHI &gt; Consulenti P.G." --> CONS("Individuazione dei titolari") --> Consolidation

    TriageR2 -- L3 --> Threshold_10("P.F. e P.G. con soglia partecipazioni &gt;= 10%") --> Consolidation
    TriageR2 -- L4 --> Threshold_5("P.F. e P.G. con soglia partecipazioni &gt;= 5%") --> Consolidation

    TriageCTR --> CA["Collaboration Agreement"] -- "Collaborazioni commerciale / Forestry / Università / Agrefeedstock" --> TriageR2 	
    CA -- "Consulenti P.G." --> CONS --> Consolidation

    TriageCTR --> Sponsor["Sponsorship"]--> TriageR2

    TriageCTR --> CkPrjFin{"Adesione a progetti finanziati <br> (v. GP par. 6.5.4)?"}--SI-->PrjFin1("DD risk based SOLO su COORDINATORE")--> TriageR2
    CkPrjFin -- NO --> PrjFin2("DD risk based per Business associate") --> TriageR2

    TriageCTR -- "Questionario DD <br>(Par. 6.2)" --> Questionnaire("ANALISI DICHIARAZIONI <br>CONTROPARTE")
    Questionnaire --> Get_SelfDecl("Estrazione PEP/Sanzionati <br>dichiarati 'Sotto Soglia'")
    Get_SelfDecl --> Consolidation
    Consolidation --> End

    style Start fill:#FFE0B2 
    style TriagePG-PF fill:#fff9c4,stroke:#fbc02d
    style Triage1 fill:#fff9c4,stroke:#fbc02d
    style Triage1_1 fill:#fff9c4,stroke:#fbc02d
    style DismissPF fill:#fca1aa,stroke:#01579b,stroke-width:2px, text-align:left
    style CkOwn fill:#9c4,stroke:#fbc02d
    style Dismiss fill:#fca1aa,stroke:#01579b,stroke-width:2px, text-align:left
    style End fill:#FFE0B2, text-align:left
    style Triage2 fill:#fff9c4,stroke:#fbc02d
    style Triage3 fill:#fff9c4,stroke:#fbc02d
    style Partial fill:#FFD600,stroke:#01579b,stroke-width:2px, text-align:left
    style CkCTP fill:#9c4,stroke:#fbc02d
    style TriageMKT fill:#fff9c4,stroke:#fbc02d
    style TriageNoP fill:#fff9c4,stroke:#fbc02d
    style TriageNoP1 fill:#fff9c4,stroke:#fbc02d
    style TriageTRUST fill:#fff9c4,stroke:#fbc02d
    style TriageFI fill:#fff9c4,stroke:#fbc02d
    style CkPrjFin fill:#9c4,stroke:#fbc02d
    style TriageCTR fill:#9c4,stroke:#fbc02d
    style Dismiss2 fill:#FFD600, text-align:left
    style TriageR4Raff fill:#fff9c4,stroke:#fbc02d
    style TriageR1 fill:#9c4,stroke:#fbc02d
    style TriageR2 fill:#9c4,stroke:#fbc02d
    style Threshold_20 fill:#e1f5fe,stroke:#01579b,stroke-width:2px
    style Threshold_10 fill:#fce4ec,stroke:#880e4f,stroke-width:2px
    style BAg fill: #e2bb8b, stroke:#01579b, stroke-width:2px
    style BA fill: #e2bb8b, stroke:#01579b, stroke-width:2px
    style CA fill: #e2bb8b, stroke:#01579b, stroke-width:2px
    style Sponsor fill: #e2bb8b, stroke:#01579b, stroke-width:2px
    style Questionnaire fill:#fff9c4,stroke:#fbc02d,stroke-width:2px
    style Consolidation fill:#e8f5e9,stroke:#2e7d32,stroke-width:2px, text-align:left`,

        fase3: `---
config:
  layout: elk
---
flowchart TB

        fase4: `---
config:
  layout: elk
---
flowchart TB
    Start(("INIZIO FASE 4:<br> SCREENING E FONTI APERTE")) -- Risk level da 1 a 4  --> InputList["Input: Lista Nominativi Consolidata FASE 3"]
    InputList --> ScopeCheck{"Ambito di Analisi?"}
    ScopeCheck -- "Standard AC&AML" --> Search_Standard["Target base: <br/> RF Notizie Avverse ACC&AML <br/> PEP / PIL"]
    ScopeCheck -- "LdB Sensibili (es. Agri)" --> Search_DU["Target base + Diritti Umani <br/> (Principi OCSE, HSE, Slavery)"]

    Search_Standard & Search_DU --> Execution["ESECUZIONE RICERCA INTEGRATA:<br>Analisi P.F./P.G. tramite Keyword specialistiche <br> Ck Liste PEP/PIL su P.F. <br> Ck P.F. e P.G. su Fonti Aperte"]
    
    Execution --> Found_Check{Riscontro <br/>Individuato?}
    InputList  -- Risk level 3 e 4  --> COMPROG{"La CTP ha adottato  <br> un COMPLIANCE PROGRAM?"} -- SI --> ScopeCheck
    COMPROG -- NO --> E_RF_Final

    Found_Check -- "NO" --> E_Clear["ESITO: <br/> NESSUN RISCONTRO"]
    E_Clear --> Form1[REPORT: FORM 1]

    Found_Check -- "SI" --> E_CheckID{"Soggetto coincidente? <br> Check Omonimia (match 100% nome PF/PG vs ASAM/WCO)"}
    
    E_CheckID -- "NO" --> E_FP["ESITO: FALSO POSITIVO"]

    let scale = 1;
    const wrapper = document.getElementById('mermaid-wrapper');

    async function loadDiagram(id) {
        wrapper.innerHTML = '';
        wrapper.style.transform = `scale(1)`;
        scale = 1;
        updateZoomLabel();

        const div = document.createElement('div');
        div.className = 'mermaid';
        div.innerHTML = diagrams[id];
        wrapper.appendChild(div);

        document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
        const btn = document.getElementById('btn-' + id);
        if(btn) btn.classList.add('active');

        await mermaid.run({ nodes: [div] });
        setTimeout(fixWrapperSize, 100);
    }

    function fixWrapperSize() {
        const svg = wrapper.querySelector('svg');
        if (svg) {
            const bbox = svg.getBBox();
            wrapper.style.width = (bbox.width * scale + 100) + "px";
            wrapper.style.height = (bbox.height * scale + 100) + "px";
        }
    }

    function changeZoom(delta) {
        scale = Math.max(0.2, Math.min(3, scale + delta));
        applyZoom();
    }

    function resetZoom() {
        scale = 1;
        applyZoom();
    }

    function applyZoom() {
        wrapper.style.transform = `scale(${scale})`;
        updateZoomLabel();
        fixWrapperSize();
    }

    function updateZoomLabel() {
        document.getElementById('zoom-val').innerText = Math.round(scale * 100) + "%";
    }

    window.onload = () => loadDiagram('master');
</script>
